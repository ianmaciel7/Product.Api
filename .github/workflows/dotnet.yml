name: .NET Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore Product.Api.sln
      - name: Build
        run: dotnet build Product.Api.sln --configuration Release

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Verify Output
        run: ls -R Product.Api.UnitTest/bin/Release/net8.0/
      - name: Run Unit Tests
        run: dotnet vstest Product.Api.UnitTest/bin/Release/net8.0/Product.Api.UnitTest.dll --configuration Release --verbosity normal --logger "trx;LogFileName=test_results.trx"
      - name: Run Integration Tests
        run: dotnet vstest Product.Api.IntegrationTest/bin/Release/net8.0/Product.Api.IntegrationTest.dll --configuration Release --verbosity normal --logger "trx;LogFileName=test_results.trx"
