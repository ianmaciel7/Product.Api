name: .NET Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Development
    steps:    
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore Product.Api.sln
      - name: Build
        run: dotnet build Product.Api.sln --configuration Debug --runtime linux-x64 --no-restore

  test:
    runs-on: ubuntu-latest
    environment: Development
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Run Tests
        run: dotnet test Product.Api.sln --configuration ${{ vars.ASPNETCORE_ENVIRONMENT }} --platform "Any CPU" --verbosity normal --logger "trx;LogFileName=test_results.trx"
